<!DOCTYPE html>
<html>
<head>
    <title>AI Research Paper Summarizer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>AI Research Paper Summarizer</h1>
    <p class="subtitle">
        Upload research papers and extract meaningful content instantly
    </p>

    <form id="uploadForm" enctype="multipart/form-data">

        <div class="upload-box">
            <h3>📄 Upload Research Paper (PDF)</h3>
            <p>Drag & drop or select a PDF file</p>
            <input type="file" name="pdf" required>
        </div>

        <button type="submit">🚀 Analyze Paper</button>
    </form>

    <div class="output" id="output">
        <p><strong>Extracted text will appear here...</strong></p>
    </div>

</div>

<script>
document.getElementById("uploadForm").onsubmit = async function(e) {
    e.preventDefault();

    document.getElementById("output").innerText = "Processing PDF...";

    let formData = new FormData(this);

    let response = await fetch("/upload/", {
        method: "POST",
        body: formData
    });

    let data = await response.json();

    document.getElementById("output").innerText =
        data.extracted_text || "No text extracted";
};
</script>
